<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales War — Q2 Kick-off</title>
<style>
  :root {
    --gold:   #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --bg:     #0d0f1a;
    --card:   #161927;
    --border: #2a2f45;
    --text:   #e8eaf6;
    --muted:  #6b7280;
    --accent: #6366f1;
    --green:  #22c55e;
    --red:    #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header-logo {
    display: inline-block;
    margin-bottom: 12px;
    height: 32px;
    filter: invert(1);
    mix-blend-mode: screen;
    opacity: 0.9;
  }
  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 4px;
  }

  /* ── Timer ── */
  #timer-section {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }
  .timer-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 28px;
    text-align: center;
    min-width: 260px;
  }
  .timer-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .timer-value {
    font-size: 2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  .timer-value.live   { color: var(--green); }
  .timer-value.before { color: var(--accent); }
  .timer-value.ended  { color: var(--muted); }

  /* ── Winner Banner ── */
  #winner-banner {
    display: none;
    text-align: center;
    padding: 20px;
    margin-bottom: 28px;
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
    border: 2px solid var(--gold);
    border-radius: 16px;
    animation: pulse 2s infinite;
  }
  #winner-banner.visible { display: block; }
  #winner-banner h2 { font-size: 1.8rem; color: var(--gold); }
  #winner-banner p  { color: var(--muted); margin-top: 4px; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.85; }
  }

  /* ── Scoring legend ── */
  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .badge-attempt  { background: rgba(99,102,241,0.2); color: #a5b4fc; }
  .badge-connect  { background: rgba(34,197,94,0.2);  color: #86efac; }
  .badge-meeting  { background: rgba(234,179,8,0.2);  color: #fde047; }

  /* ── Leaderboard ── */
  #leaderboard {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .ae-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 48px 52px 1fr auto;
    align-items: center;
    gap: 16px;
    transition: transform 0.3s ease, border-color 0.3s ease;
  }

  .ae-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top;
    border: 2px solid var(--border);
    background: var(--border);
  }
  .rank-1 .ae-avatar { border-color: var(--gold); }
  .rank-2 .ae-avatar { border-color: var(--silver); }
  .rank-3 .ae-avatar { border-color: var(--bronze); }
  .ae-card:hover { transform: translateY(-1px); }
  .ae-card.absent { opacity: 0.35; filter: grayscale(1); pointer-events: none; }
  .absent-note {
    grid-column: 3 / 4;
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 4px;
  }
  .ae-card.rank-1 { border-color: var(--gold);   background: linear-gradient(135deg, rgba(255,215,0,0.08), var(--card)); }
  .ae-card.rank-2 { border-color: var(--silver); background: linear-gradient(135deg, rgba(192,192,192,0.07), var(--card)); }
  .ae-card.rank-3 { border-color: var(--bronze); background: linear-gradient(135deg, rgba(205,127,50,0.07), var(--card)); }

  .rank {
    font-size: 1.6rem;
    font-weight: 800;
    text-align: center;
    min-width: 40px;
  }
  .rank-1 .rank { color: var(--gold); }
  .rank-2 .rank { color: var(--silver); }
  .rank-3 .rank { color: var(--bronze); }
  .rank-other .rank { color: var(--muted); font-size: 1.2rem; }

  .ae-info { min-width: 0; }
  .ae-name {
    font-size: 1.15rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ae-stats {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.78rem;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .stat-pill.attempt { background: rgba(99,102,241,0.15); color: #a5b4fc; }
  .stat-pill.connect { background: rgba(34,197,94,0.15);  color: #86efac; }
  .stat-pill.meeting { background: rgba(234,179,8,0.15);  color: #fde047; }
  .stat-pill .count  { font-weight: 700; }

  .ae-score {
    text-align: right;
    white-space: nowrap;
  }
  .score-value {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
  }
  .rank-1 .score-value { color: var(--gold); }
  .rank-2 .score-value { color: var(--silver); }
  .rank-3 .score-value { color: var(--bronze); }
  .rank-other .score-value { color: var(--text); }
  .score-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ── Progress bar ── */
  .progress-bar-wrap {
    grid-column: 1 / -1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 2px;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
    background: linear-gradient(90deg, #6366f1, #a855f7);
  }
  .rank-1 .progress-bar-fill { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .rank-2 .progress-bar-fill { background: linear-gradient(90deg, #9ca3af, #d1d5db); }
  .rank-3 .progress-bar-fill { background: linear-gradient(90deg, #b45309, #d97706); }

  /* ── Footer ── */
  footer {
    text-align: center;
    margin-top: 36px;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    background: var(--muted);
  }
  .status-dot.connected    { background: var(--green); animation: blink 2s infinite; }
  .status-dot.disconnected { background: var(--red); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* ── Error banner ── */
  #error-banner {
    display: none;
    max-width: 800px;
    margin: 0 auto 20px;
    padding: 12px 16px;
    border-radius: 10px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
    font-size: 0.85rem;
    text-align: center;
  }
  #error-banner.visible { display: block; }

  /* ── Mobile adjustments ── */
  @media (max-width: 480px) {
    .ae-card { grid-template-columns: 30px 42px 1fr auto; gap: 10px; padding: 14px 14px; }
    .rank { font-size: 1.3rem; }
    .ae-avatar { width: 40px; height: 40px; }
    .ae-name { font-size: 1rem; }
    .score-value { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <img src="/sortlist-logo.png" class="header-logo" alt="Sortlist">
  <h1>Sales War — Q2 Kick-off</h1>
  <p class="subtitle">April 10 · 9:30 → 13:30</p>
</header>

<section id="timer-section">
  <div class="timer-box">
    <div class="timer-label" id="timer-label">Loading...</div>
    <div class="timer-value" id="timer-value">--:--:--</div>
  </div>
</section>

<div id="winner-banner">
  <h2 id="winner-name">🏆 Winner!</h2>
  <p id="winner-score"></p>
</div>

<div id="error-banner"></div>

<div class="legend">
  <div class="legend-item"><span class="badge badge-attempt">× 1pt</span> Call attempt</div>
  <div class="legend-item"><span class="badge badge-connect">× 5pts</span> Connected call</div>
  <div class="legend-item"><span class="badge badge-meeting">× 25pts</span> Meeting booked</div>
</div>

<div id="leaderboard"></div>

<footer>
  <span class="status-dot" id="status-dot"></span>
  <span id="status-text">Connecting...</span>
</footer>

<script>
  const WAR_START = new Date('2026-04-10T09:30:00+02:00').getTime();
  const WAR_END   = new Date('2026-04-10T13:30:00+02:00').getTime();

  // ── Timer ──────────────────────────────────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }

  function formatMs(ms) {
    if (ms <= 0) return '00:00:00';
    const h = Math.floor(ms / 3_600_000);
    const m = Math.floor((ms % 3_600_000) / 60_000);
    const s = Math.floor((ms % 60_000) / 1_000);
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  function updateTimer() {
    const now  = Date.now();
    const tv   = document.getElementById('timer-value');
    const tl   = document.getElementById('timer-label');

    if (now < WAR_START) {
      tv.className = 'timer-value before';
      tl.textContent = 'Starts in';
      tv.textContent = formatMs(WAR_START - now);
    } else if (now <= WAR_END) {
      tv.className = 'timer-value live';
      tl.textContent = 'Time remaining';
      tv.textContent = formatMs(WAR_END - now);
    } else {
      tv.className = 'timer-value ended';
      tl.textContent = 'War ended';
      tv.textContent = '00:00:00';
    }
  }

  setInterval(updateTimer, 1000);
  updateTimer();

  // ── Photos ────────────────────────────────────────────────────────────────
  const PHOTOS = {
    '76991650': 'photo-alberto.png',
    '40312105': 'photo-celia.png',
    '84528640': 'photo-jakob.png',
    '87073113': 'photo-manuel.png',
  };

  // ── Leaderboard render ─────────────────────────────────────────────────────
  function render(data) {
    const { leaderboard, updatedAt, error } = data;

    // Error banner
    const errBanner = document.getElementById('error-banner');
    if (error) {
      errBanner.textContent = `⚠️ HubSpot error: ${error}`;
      errBanner.classList.add('visible');
    } else {
      errBanner.classList.remove('visible');
    }

    // Status footer
    document.getElementById('status-dot').className = 'status-dot connected';
    document.getElementById('status-text').textContent =
      updatedAt ? `Live · last updated ${new Date(updatedAt).toLocaleTimeString()}` : 'Connected';

    // Winner banner (only after war ends)
    const now = Date.now();
    if (now > WAR_END && leaderboard.length > 0) {
      const winner = leaderboard[0];
      document.getElementById('winner-banner').classList.add('visible');
      document.getElementById('winner-name').textContent = `🏆 ${winner.name} wins!`;
      document.getElementById('winner-score').textContent =
        `${winner.score} points · ${winner.meetings} meetings booked`;
    }

    // Max score for progress bars
    const maxScore = leaderboard.reduce((m, ae) => Math.max(m, ae.score), 1);

    const board = document.getElementById('leaderboard');
    board.innerHTML = leaderboard.map((ae, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const rankEmoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
      const pct = Math.round((ae.score / maxScore) * 100);

      const photo = PHOTOS[ae.id] || '';
      const absentClass = ae.absent ? 'absent' : '';
      const absentNote = ae.absent ? `<div class="absent-note">🤒 ${ae.note || 'On sick leave today'}</div>` : '';

      return `
        <div class="ae-card ${rankClass} ${absentClass}">
          <div class="rank">${rankEmoji}</div>
          ${photo ? `<img class="ae-avatar" src="/${photo}" alt="${ae.name}">` : '<div class="ae-avatar"></div>'}
          <div class="ae-info">
            <div class="ae-name">${ae.name}</div>
            ${absentNote}
            <div class="ae-stats">
              <div class="stat-pill attempt">
                📞 <span class="count">${ae.attempts}</span> attempts
              </div>
              <div class="stat-pill connect">
                ✅ <span class="count">${ae.connected}</span> connected
              </div>
              <div class="stat-pill meeting">
                📅 <span class="count">${ae.meetings}</span> meetings
              </div>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="ae-score">
            <div class="score-value">${ae.score}</div>
            <div class="score-label">pts</div>
          </div>
        </div>`;
    }).join('');
  }

  // ── SSE connection ─────────────────────────────────────────────────────────
  let es;

  function connect() {
    es = new EventSource('/events');

    es.onmessage = e => {
      try { render(JSON.parse(e.data)); }
      catch { /* ignore parse errors */ }
    };

    es.onerror = () => {
      document.getElementById('status-dot').className = 'status-dot disconnected';
      document.getElementById('status-text').textContent = 'Reconnecting...';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();
</script>
</body>
</html>
